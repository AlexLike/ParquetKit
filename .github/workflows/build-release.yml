name: Build Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build xcframework and attach to release
    runs-on: macos-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.name }}

      # ── Smart rebuild: check if Driver/ changed since the previous tag ────
      - name: Find previous release tag
        id: prev-tag
        run: |
          CURRENT="${{ steps.tag.outputs.name }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^${CURRENT}$" | head -1)
          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT}, Previous: ${PREV:-<none>}"

      - name: Check if Driver/ changed since previous tag
        id: driver-changed
        run: |
          PREV="${{ steps.prev-tag.outputs.prev_tag }}"
          if [ -z "$PREV" ]; then
            echo "First release — must build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "${PREV}".."${{ steps.tag.outputs.name }}" -- Driver/)
            if [ -n "$CHANGED" ]; then
              echo "Driver/ changed since ${PREV}:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Driver/ unchanged since ${PREV} — reusing previous xcframework."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Fast path: reuse xcframework from the previous release ───────────
      - name: Download xcframework from previous release
        if: steps.driver-changed.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.prev-tag.outputs.prev_tag }}" \
            --pattern "ParquetKitFFI.xcframework.zip" \
            --dir /tmp/prev-release
          unzip /tmp/prev-release/ParquetKitFFI.xcframework.zip -d .

      # ── Slow path: full build for all 11 Apple targets ───────────────────
      - name: Cache Rust (release build)
        if: steps.driver-changed.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Driver/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('Driver/Cargo.lock', 'Driver/Cargo.toml', 'Driver/rust-toolchain.toml') }}
          restore-keys: rust-release-${{ runner.os }}-

      - name: Build xcframework (FULL=1, all 11 Apple targets)
        if: steps.driver-changed.outputs.changed == 'true'
        run: FULL=1 bash scripts/build-xcframework release

      # ── Package ───────────────────────────────────────────────────────────
      - name: Zip xcframework
        # ditto preserves extended attributes required by xcframeworks;
        # plain zip -r silently strips them, causing checksum mismatches.
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            ParquetKitFFI.xcframework \
            ParquetKitFFI.xcframework.zip

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum ParquetKitFFI.xcframework.zip)
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Checksum: ${CHECKSUM}"

      # ── Patch Package.swift with the release URL and checksum ─────────────
      - name: Patch Package.swift
        env:
          URL: "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/ParquetKitFFI.xcframework.zip"
          CHECKSUM: "${{ steps.checksum.outputs.checksum }}"
        run: |
          python3 - <<'PYEOF'
          import re, os, sys
          url = os.environ["URL"]
          checksum = os.environ["CHECKSUM"]
          text = open("Package.swift").read()
          pattern = r'\.binaryTarget\(\s*\n\s*name:\s*"ParquetKitFFIBinary",\s*\n\s*path:\s*"ParquetKitFFI\.xcframework"\s*\n\s*\)'
          replacement = (
            '.binaryTarget(\n'
            '      name: "ParquetKitFFIBinary",\n'
            f'      url: "{url}",\n'
            f'      checksum: "{checksum}"\n'
            '    )'
          )
          new_text, n = re.subn(pattern, replacement, text)
          if n != 1:
            print(f"ERROR: Expected 1 match, got {n}", file=sys.stderr)
            sys.exit(1)
          open("Package.swift", "w").write(new_text)
          print("Package.swift patched.")
          PYEOF

      # ── Commit Package.swift in detached HEAD and force-push the tag ──────
      # This keeps main untouched — only the tag pointer moves.
      - name: Commit and force-push tag
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "release: attach xcframework for ${TAG} [skip ci]"
          git tag -f "${TAG}"
          git push origin "${TAG}" --force

      # ── Upload xcframework zip as a release asset ─────────────────────────
      - name: Upload xcframework to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" \
            ParquetKitFFI.xcframework.zip \
            --clobber
