name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases; queue rather than cancel so no push is skipped.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

# ── Stage 1: version ─────────────────────────────────────────────────────────
# Dry-run semantic-release to decide whether a release is warranted and, if so,
# compute the next version and generate the release notes.  Nothing is tagged or
# published here.
jobs:
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.semrel.outputs.should_release }}
      version: ${{ steps.semrel.outputs.version }}
      notes: ${{ steps.semrel.outputs.notes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install semantic-release
        run: |
          npm install --no-save \
            semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator

      - name: Dry-run semantic-release
        id: semrel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module - <<'JSEOF'
          import { appendFileSync } from 'fs';
          import semanticRelease from 'semantic-release';

          const result = await semanticRelease({ dryRun: true });

          const append = line => appendFileSync(process.env.GITHUB_OUTPUT, line + '\n');

          if (result?.nextRelease) {
            const { version, notes } = result.nextRelease;
            append('should_release=true');
            append(`version=${version}`);
            append('notes<<RELEASE_NOTES_EOF');
            append(notes ?? '');
            append('RELEASE_NOTES_EOF');
          } else {
            append('should_release=false');
          }
          JSEOF

  # ── Stage 2: build (matrix) ───────────────────────────────────────────────
  # Build all 11 Apple Rust targets in parallel.  Each job uploads its static
  # library as a workflow artifact consumed by the patch stage.
  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - { target: aarch64-apple-darwin, deploy_env: "MACOSX_DEPLOYMENT_TARGET=10.15" }
          - { target: x86_64-apple-darwin, deploy_env: "MACOSX_DEPLOYMENT_TARGET=10.15" }
          - { target: aarch64-apple-ios, deploy_env: "IPHONEOS_DEPLOYMENT_TARGET=13.0" }
          - { target: aarch64-apple-ios-sim, deploy_env: "IPHONEOS_DEPLOYMENT_TARGET=13.0" }
          - { target: aarch64-apple-ios-macabi, deploy_env: "IPHONEOS_DEPLOYMENT_TARGET=13.1" }
          - { target: aarch64-apple-tvos, deploy_env: "TVOS_DEPLOYMENT_TARGET=13.0" }
          - { target: aarch64-apple-tvos-sim, deploy_env: "TVOS_DEPLOYMENT_TARGET=13.0" }
          - { target: aarch64-apple-visionos, deploy_env: "XROS_DEPLOYMENT_TARGET=1.0" }
          - { target: aarch64-apple-visionos-sim, deploy_env: "XROS_DEPLOYMENT_TARGET=1.0" }
          - { target: aarch64-apple-watchos, deploy_env: "WATCHOS_DEPLOYMENT_TARGET=9.0" }
          - { target: aarch64-apple-watchos-sim, deploy_env: "WATCHOS_DEPLOYMENT_TARGET=9.0" }
    defaults:
      run:
        working-directory: Driver
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: ~/.rustup/toolchains
          key: rustup-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Driver/rust-toolchain.toml') }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('Driver/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: Driver/target/${{ matrix.target }}
          key: rust-release-${{ matrix.target }}-${{ hashFiles('Driver/Cargo.lock', 'Driver/Cargo.toml', 'Driver/rust-toolchain.toml', 'Driver/src/**') }}
          restore-keys: rust-release-${{ matrix.target }}-

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: ${{ matrix.deploy_env }} cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: Driver/target/${{ matrix.target }}/release/libparquetkit_driver.a
          if-no-files-found: error
          retention-days: 1

  # ── Stage 3: patch ───────────────────────────────────────────────────────
  # Download all binaries, assemble the XCFramework, patch Package.swift with
  # the release URL + checksum, push to main, and surface the new HEAD SHA.
  patch:
    name: Assemble XCFramework and patch Package.swift
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: macos-latest
    outputs:
      head_sha: ${{ steps.push.outputs.head_sha }}
    steps:
      # Generate the App token first so checkout can use it directly.
      # This avoids a manual `git remote set-url` later and ensures all
      # git operations on main are authenticated as the App throughout.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: /tmp/binaries

      - name: Assemble XCFramework
        run: |
          STAGING="/tmp/xcframework-staging"
          OUTPUT="$PWD/ParquetKitRustDriver.xcframework"
          HEADERS="$PWD/Sources/ParquetKitFFI"
          BINS="/tmp/binaries"

          rm -rf "$STAGING" "$OUTPUT"

          create_platform_slice() {
            local name="$1"
            shift
            local libs="$@"
            local dir="$STAGING/$name"
            mkdir -p "$dir/Headers/ParquetKitRustDriver"

            # lipo if multiple, copy if single
            local count=$(echo "$libs" | wc -w)
            if [ "$count" -eq 1 ]; then
              cp $libs "$dir/libparquetkit_driver.a"
            else
              lipo -create $libs -output "$dir/libparquetkit_driver.a"
            fi

            cp "$HEADERS/ParquetKitRustDriver.h"        "$dir/Headers/ParquetKitRustDriver/"
            cp "$HEADERS/ParquetKitRustDriver.modulemap" "$dir/Headers/ParquetKitRustDriver/module.modulemap"
            echo "-library $dir/libparquetkit_driver.a -headers $dir/Headers"
          }

          FRAMEWORK_ARGS=""

          # macOS (two archs — lipo'd)
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice macos \
            "$BINS/binary-aarch64-apple-darwin/libparquetkit_driver.a" \
            "$BINS/binary-x86_64-apple-darwin/libparquetkit_driver.a")"

          # iOS device
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice ios \
            "$BINS/binary-aarch64-apple-ios/libparquetkit_driver.a")"

          # iOS simulator
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice ios-simulator \
            "$BINS/binary-aarch64-apple-ios-sim/libparquetkit_driver.a")"

          # Mac Catalyst
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice maccatalyst \
            "$BINS/binary-aarch64-apple-ios-macabi/libparquetkit_driver.a")"

          # tvOS
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice tvos \
            "$BINS/binary-aarch64-apple-tvos/libparquetkit_driver.a")"

          # tvOS simulator
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice tvos-simulator \
            "$BINS/binary-aarch64-apple-tvos-sim/libparquetkit_driver.a")"

          # visionOS
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice xros \
            "$BINS/binary-aarch64-apple-visionos/libparquetkit_driver.a")"

          # visionOS simulator
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice xros-simulator \
            "$BINS/binary-aarch64-apple-visionos-sim/libparquetkit_driver.a")"

          # watchOS
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice watchos \
            "$BINS/binary-aarch64-apple-watchos/libparquetkit_driver.a")"

          # watchOS simulator
          FRAMEWORK_ARGS="$FRAMEWORK_ARGS $(create_platform_slice watchos-simulator \
            "$BINS/binary-aarch64-apple-watchos-sim/libparquetkit_driver.a")"

          eval xcodebuild -create-xcframework $FRAMEWORK_ARGS -output "$OUTPUT"

      # ditto preserves the extended attributes xcframeworks require; plain zip -r
      # silently strips them and causes checksum mismatches on the Swift side.
      - name: Zip XCFramework
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            ParquetKitRustDriver.xcframework \
            ParquetKitRustDriver.xcframework.zip

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum ParquetKitRustDriver.xcframework.zip)
          echo "value=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Patch Package.swift
        env:
          VERSION: ${{ needs.version.outputs.version }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
        run: |
          python3 - <<'PYEOF'
          import re, os, sys

          version  = os.environ["VERSION"]
          checksum = os.environ["CHECKSUM"]
          repo     = os.environ["GITHUB_REPOSITORY"]
          url      = f"https://github.com/{repo}/releases/download/v{version}/ParquetKitRustDriver.xcframework.zip"

          text = open("Package.swift").read()

          # Matches both the path: form (local dev) and the url:/checksum: form
          # (previous release), replacing either with the new url:/checksum: values.
          pattern = (
            r'\.binaryTarget\(\s*\n\s*name:\s*"ParquetKitRustDriver",\s*\n\s*'
            r'(?:path:\s*"ParquetKitRustDriver\.xcframework"|url:\s*"[^"]+",\s*\n\s*checksum:\s*"[^"]+")'
            r'\s*\n\s*\)'
          )
          replacement = (
            '.binaryTarget(\n'
            '      name: "ParquetKitRustDriver",\n'
            f'      url: "{url}",\n'
            f'      checksum: "{checksum}"\n'
            '    )'
          )
          new_text, n = re.subn(pattern, replacement, text)
          if n != 1:
            print(f"ERROR: expected 1 match, got {n}", file=sys.stderr)
            sys.exit(1)
          open("Package.swift", "w").write(new_text)
          print(f"Patched Package.swift — url: {url}")
          PYEOF

      - name: Commit and push to main
        id: push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Package.swift
          git commit -m "release: patch Package.swift for v${{ needs.version.outputs.version }} [skip ci]"
          git push origin main

          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload XCFramework zip as artifact
        uses: actions/upload-artifact@v7
        with:
          name: xcframework-zip
          path: ParquetKitRustDriver.xcframework.zip
          retention-days: 1

  # ── Stage 4: release ─────────────────────────────────────────────────────
  # Create the git tag on the patched HEAD, open a draft release, attach the
  # XCFramework zip, then publish.  Using a draft ensures assets are present
  # before the release becomes visible to consumers.
  # GITHUB_TOKEN is sufficient here — tag + release creation are plain
  # contents:write operations, no branch-protection bypass required.
  release:
    name: Publish release
    needs: [version, patch]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download XCFramework zip
        uses: actions/download-artifact@v8
        with:
          name: xcframework-zip

      - name: Create tag on patched HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.version.outputs.version }}
          SHA: ${{ needs.patch.outputs.head_sha }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/${TAG}\",\"sha\":\"${SHA}\"}"

      - name: Write release notes to file
        env:
          NOTES: ${{ needs.version.outputs.notes }}
        run: printf '%s' "$NOTES" > /tmp/release-notes.md

      - name: Create draft release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.version.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --draft \
            ParquetKitRustDriver.xcframework.zip

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --draft=false
