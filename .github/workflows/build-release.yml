name: Build Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build xcframework and attach to release
    runs-on: macos-latest
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          TAG="${{ inputs.tag_name || github.event.release.tag_name }}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.name }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # ── Smart rebuild: check if Driver/ changed since the previous release ─
      # The previous release tag is extracted from the url: field in Package.swift.
      # If Package.swift uses path: (local binary), there is no previous URL and
      # we must build. Committing scripts/use-local-binary output signals a rebuild.
      - name: Check if Driver/ changed since previous release
        id: driver-changed
        run: |
          PREV=$(python3 -c "
          import re, sys
          text = open('Package.swift').read()
          m = re.search(r'download/(v[^/]+)/ParquetKitFFI\.xcframework\.zip', text)
          print(m.group(1) if m else '')
          ")
          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"
          if [ -z "$PREV" ]; then
            echo "No previous release URL in Package.swift — must build."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "${PREV}".."${{ steps.tag.outputs.name }}" -- Driver/)
            if [ -n "$CHANGED" ]; then
              echo "Driver/ changed since ${PREV}:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Driver/ unchanged since ${PREV} — reusing previous xcframework."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Fast path: reuse xcframework from the previous release ───────────
      - name: Download xcframework from previous release
        if: steps.driver-changed.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.driver-changed.outputs.prev_tag }}" \
            --pattern "ParquetKitFFI.xcframework.zip" \
            --dir /tmp/prev-release
          unzip /tmp/prev-release/ParquetKitFFI.xcframework.zip -d .

      # ── Slow path: full build for all 11 Apple targets ───────────────────
      - name: Cache Rust toolchain
        if: steps.driver-changed.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.rustup/toolchains
          key: rustup-${{ runner.os }}-${{ hashFiles('Driver/rust-toolchain.toml') }}

      - name: Cache Rust (release build)
        if: steps.driver-changed.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Driver/target
          key: rust-release-${{ runner.os }}-${{ hashFiles('Driver/Cargo.lock', 'Driver/Cargo.toml', 'Driver/rust-toolchain.toml') }}
          restore-keys: rust-release-${{ runner.os }}-

      - name: Build xcframework (FULL=1, all 11 Apple targets)
        if: steps.driver-changed.outputs.changed == 'true'
        run: FULL=1 bash scripts/build-xcframework release

      # ── Package ───────────────────────────────────────────────────────────
      - name: Zip xcframework
        # ditto preserves extended attributes required by xcframeworks;
        # plain zip -r silently strips them, causing checksum mismatches.
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            ParquetKitFFI.xcframework \
            ParquetKitFFI.xcframework.zip

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum ParquetKitFFI.xcframework.zip)
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Checksum: ${CHECKSUM}"

      # ── Patch Package.swift, commit to main, and retag ───────────────────
      # Handles both the path: form (local binary) and the url:/checksum: form
      # (previous release), replacing either with the new url:/checksum: values.
      - name: Patch Package.swift
        env:
          URL: "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/ParquetKitFFI.xcframework.zip"
          CHECKSUM: "${{ steps.checksum.outputs.checksum }}"
        run: |
          python3 - <<'PYEOF'
          import re, os, sys
          url = os.environ["URL"]
          checksum = os.environ["CHECKSUM"]
          text = open("Package.swift").read()
          pattern = (
            r'\.binaryTarget\(\s*\n\s*name:\s*"ParquetKitFFIBinary",\s*\n\s*'
            r'(?:path:\s*"ParquetKitFFI\.xcframework"|url:\s*"[^"]+",\s*\n\s*checksum:\s*"[^"]+")'
            r'\s*\n\s*\)'
          )
          replacement = (
            '.binaryTarget(\n'
            '      name: "ParquetKitFFIBinary",\n'
            f'      url: "{url}",\n'
            f'      checksum: "{checksum}"\n'
            '    )'
          )
          new_text, n = re.subn(pattern, replacement, text)
          if n != 1:
            print(f"ERROR: Expected 1 match, got {n}", file=sys.stderr)
            sys.exit(1)
          open("Package.swift", "w").write(new_text)
          print("Package.swift patched.")
          PYEOF

      - name: Commit to main and retag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Save the patched Package.swift, then apply it on main
          cp Package.swift /tmp/Package.swift.patched
          git checkout main
          cp /tmp/Package.swift.patched Package.swift

          git add Package.swift
          git commit -m "release: attach xcframework for ${TAG} [skip ci]"
          git tag -f "${TAG}"
          git push origin main
          git push origin "${TAG}" --force

      # ── Upload xcframework zip as a release asset ─────────────────────────
      - name: Upload xcframework to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" \
            ParquetKitFFI.xcframework.zip \
            --clobber
